<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Calendar 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary-color: #2b6cb0;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-size: 24px;
            color: #1a202c;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Tabs Styling */
        .tabs-container {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab-button {
            background: none;
            border: none;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            color: #718096;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab-button:hover {
            color: var(--primary-color);
            background-color: #edf2f7;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }

        .tab-button.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            font-weight: 600;
        }

        /* Table Styling */
        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #edf2f7;
            color: #4a5568;
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            color: #4a5568;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        /* Status States */
        .loading, .error {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: #4a5568;
        }
        .error { color: #e53e3e; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="doc-title">Excel Data Viewer</h1>
    
    <div id="tabs" class="tabs-container"></div>
    
    <div id="table-wrapper" class="table-wrapper">
        <div class="loading">Loading Excel data sheets...</div>
    </div>
</div>

<script>
    // 1. Change this to match your exact Excel filename in your repository
    const FILE_NAME = 'data.xlsx'; 

    async function init() {
        try {
            // Fetch the Excel file dynamically
            const response = await fetch(FILE_NAME);
            if (!response.ok) throw new Error(`Could not find "${FILE_NAME}" in this directory.`);
            
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, { type: 'array' });
            
            buildViewer(workbook);
        } catch (err) {
            document.getElementById('table-wrapper').innerHTML = `
                <div class="error">
                    <strong>Error loading file:</strong> ${err.message}<br>
                    <small>Ensure the file is named exactly <code>${FILE_NAME}</code> and is located in the same folder.</small>
                </div>`;
        }
    }

    function buildViewer(workbook) {
        const tabsContainer = document.getElementById('tabs');
        tabsContainer.innerHTML = ''; // Clear loading

        // Generate tabs for each Excel Sheet
        workbook.SheetNames.forEach((sheetName, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-button ${index === 0 ? 'active' : ''}`;
            btn.textContent = sheetName;
            
            btn.onclick = () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                displaySheet(workbook.Sheets[sheetName]);
            };
            
            tabsContainer.appendChild(btn);
        });

        // Load the very first sheet by default
        if (workbook.SheetNames.length > 0) {
            displaySheet(workbook.Sheets[workbook.SheetNames[0]]);
        }
    }

    function displaySheet(sheet) {
        const wrapper = document.getElementById('table-wrapper');
        // Convert SheetJS object cleanly to HTML Table string
        const htmlTable = XLSX.utils.sheet_to_html(sheet);
        wrapper.innerHTML = htmlTable;
    }

    // Run on page load
    window.onload = init;
</script>

</body>
</html>
